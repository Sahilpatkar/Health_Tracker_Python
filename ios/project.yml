name: HealthTracker
options:
  bundleIdPrefix: com.healthtracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: HealthTracker/Config/Debug.xcconfig
  Release: HealthTracker/Config/Release.xcconfig

targets:
  HealthTracker:
    type: application
    platform: iOS
    sources:
      - path: HealthTracker
        excludes:
          - "Config/*.xcconfig"
    settings:
      base:
        INFOPLIST_FILE: HealthTracker/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.healthtracker.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
